name: langfuse
version: "1.0.0"
description: "Optional Langfuse observability for Ruslan — traces conversations, LLM calls, and tool usage. Opt-in via `ruslan plugins enable observability/langfuse` or `ruslan tools → Langfuse Observability`."
author: NousResearch
requires_env:
  - RUSLAN_LANGFUSE_PUBLIC_KEY
  - RUSLAN_LANGFUSE_SECRET_KEY
hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
